services:
  db:
    image: postgres:15
    container_name: railway_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: logistics_service
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d logistics_service"]
      interval: 3s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: railway_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/logistics_service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  scheduler:
    build: ./backend
    container_name: railway_scheduler
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/logistics_service
    command: ["python", "run_scheduler.py"]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: railway_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend