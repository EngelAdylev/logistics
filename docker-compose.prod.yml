services:
  db:
    image: postgres:15
    container_name: railway_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-logistics_service}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-logistics_service}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    # Port NOT exposed — db is only accessible inside docker network

  backend:
    build: ./backend
    container_name: railway_backend
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-logistics_service}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: https://${DOMAIN}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    # Port NOT exposed — accessed only via nginx proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: railway_frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    restart: always

  certbot:
    image: certbot/certbot
    container_name: railway_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Auto-renew every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: always

volumes:
  postgres_data:
